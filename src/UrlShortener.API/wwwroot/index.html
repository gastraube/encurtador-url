<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <h1>URL Shortener</h1>
          <p class="text-muted">
            Encurte suas URLs e compartilhe com facilidade
          </p>
          <div class="card">
            <div class="card-body">
              <div class="mb-3">
                <label for="originalUrl" class="form-label">URL Original</label>
                <input
                  type="url"
                  class="form-control"
                  id="originalUrl"
                  placeholder="https://example.com/very/long/url"
                />
              </div>
              <div class="mb-3">
                <label for="customAlias" class="form-label"
                  >Alias Personalizado (opcional)</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="customAlias"
                  placeholder="meu-alias"
                />
              </div>
              <button class="btn btn-primary w-100" id="shortenBtn">
                Gerar URL Encurtada
              </button>
              <div
                id="errorMessage"
                class="alert alert-danger mt-3"
                style="display: none"
              ></div>
              <div
                id="successMessage"
                class="alert alert-success mt-3"
                style="display: none"
              >
                <h5>URL Encurtada Gerada!</h5>
                <div class="input-group">
                  <input
                    type="text"
                    class="form-control"
                    id="shortenedUrlInput"
                    readonly
                  />
                  <button
                    class="btn btn-outline-secondary"
                    type="button"
                    id="copyBtn"
                  >
                    Copiar
                  </button>
                </div>
                <small class="d-block mt-2 text-muted"
                  >Original: <a id="originalLink" href="#" target="_blank"></a
                ></small>
                <small class="d-block text-muted" s
                  >Acessos: <span id="accessCount">0</span></small
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
